name: Sync Figma tokens

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Pull tokens from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node scripts/sync-figma.mjs

      - name: Commit and push if tokens changed
        run: |
          git config user.name  "figma-sync[bot]"
          git config user.email "figma-sync[bot]@users.noreply.github.com"
          git add tokens/ changelog/
          if git diff --cached --quiet; then
            echo "No token changes — skipping commit."
          else
            git commit -m "chore: sync tokens from Figma [$(date -u +%Y-%m-%d)]"
            git push
          fi
